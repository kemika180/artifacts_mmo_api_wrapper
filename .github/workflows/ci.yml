name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Check out into a package-named subdir so the relative imports
      # (from .db_cache import ...) resolve when type-checking / importing.
      - name: Checkout into package dir
        uses: actions/checkout@v4
        with:
          path: pkg/artifacts_mmo_api_wrapper

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8 mypy requests progress

      - name: Lint (flake8)
        working-directory: pkg/artifacts_mmo_api_wrapper
        run: flake8 .

      - name: Type check (mypy)
        working-directory: pkg
        run: mypy --ignore-missing-imports --check-untyped-defs artifacts_mmo_api_wrapper

      - name: Import smoke test
        working-directory: pkg
        run: python -c "import artifacts_mmo_api_wrapper.artifacts, artifacts_mmo_api_wrapper.db_cache; print('import OK')"
